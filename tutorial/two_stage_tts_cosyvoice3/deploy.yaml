# CosyVoice3 deploy config for RTX 3090 (24 GB)
# 2-stage pipeline: talker (stage 0) → flow-matching code2wav (stage 1).
# CosyVoice3 is a TTS model; it intentionally has no Thinker stage.
#
# Memory allocation tuned for ~10 GB free:
#   Stage 0: 0.25 × 24 = 6.0 GiB
#   Stage 1: 0.15 × 24 = 3.6 GiB
#   Total: 9.6 GiB
async_chunk: true
dtype: float32

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      codec_streaming: true
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 15
      codec_left_context_frames: 25
      codec_vocab_size: 6561

stages:
  - stage_id: 0
    max_num_batched_tokens: 32768
    max_num_seqs: 4
    gpu_memory_utilization: 0.20
    enforce_eager: false
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      max_tokens: 2048
      top_k: 25
      top_p: 0.8
      repetition_penalty: 1.0001
    disable_hybrid_kv_cache_manager: true
    mm_processor_cache_gb: 0
    skip_mm_profiling: true

  - stage_id: 1
    max_num_batched_tokens: 32768
    max_num_seqs: 4
    gpu_memory_utilization: 0.12
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    max_model_len: 32768
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      max_tokens: 2048
    disable_hybrid_kv_cache_manager: true
    skip_mm_profiling: true
